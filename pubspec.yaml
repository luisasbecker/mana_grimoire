name: mana_grimoire
description: Mana Grimoire - A Magic The Gathering collection and deck manager.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Local database (SQLite via Drift)
  drift: ^2.20.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Images
  cached_network_image: ^3.4.1
  camera: ^0.11.2+1
  google_mlkit_text_recognition: ^0.15.1

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.6.2

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.12
  drift_dev: ^2.20.0

  # Lints
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
